<div id="pin-button-{{ account.pk }}"
     class="flex items-center gap-2"
     {% if oob %}hx-swap-oob="true"{% endif %}>
    {% if account.in_starter_pack %}
        {% if pin_limit_reached %}
            <span class="text-xs whitespace-nowrap text-amber-600 dark:text-amber-400">
                {% blocktrans with max=max_pinned_accounts %}You can pin at most {{ max }} accounts{% endblocktrans %}
            </span>
        {% endif %}
        <button type="button"
                hx-post="{% url 'toggle_pin_in_starter_pack' starter_pack.slug account.pk %}"
                hx-target="#pin-button-{{ account.pk }}"
                hx-swap="outerHTML"
                data-umami-event="pin-pack-account"
                title="{% if account.is_pinned %}{% trans "Unpin this account" %}{% else %}{% trans "Pin this account to the top" %}{% endif %}"
                aria-pressed="{{ account.is_pinned|yesno:'true,false' }}"
                class="plausible-event-name=pin-pack-account rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-amber-400 {% if account.is_pinned %}text-amber-500 bg-amber-50 hover:text-amber-600 dark:bg-gray-700 dark:hover:text-amber-400{% else %}text-gray-400 hover:text-amber-500 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %}">
            {% if account.is_pinned %}
                <svg class="w-5 h-5"
                     aria-hidden="true"
                     xmlns="http://www.w3.org/2000/svg"
                     fill="currentColor"
                     viewBox="0 0 16 16">
                    <path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a6 6 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707s.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a6 6 0 0 1 1.013.16l3.134-3.133a3 3 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146" />
                </svg>
            {% else %}
                <svg class="w-5 h-5"
                     aria-hidden="true"
                     xmlns="http://www.w3.org/2000/svg"
                     fill="currentColor"
                     viewBox="0 0 16 16">
                    <path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a6 6 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707s.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a6 6 0 0 1 1.013.16l3.134-3.133a3 3 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146m.122 2.112v-.002zm0-.002v.002a.5.5 0 0 1-.122.51L6.293 6.878a.5.5 0 0 1-.511.12H5.78l-.014-.004a5 5 0 0 0-.288-.076 5 5 0 0 0-.765-.116c-.422-.028-.836.008-1.175.15l5.51 5.509c.141-.34.177-.753.149-1.175a5 5 0 0 0-.192-1.054l-.004-.013v-.001a.5.5 0 0 1 .12-.512l3.536-3.535a.5.5 0 0 1 .532-.115l.096.022c.087.017.208.034.344.034q.172.002.343-.04L9.927 2.028q-.042.172-.04.343a1.8 1.8 0 0 0 .062.46z" />
                </svg>
            {% endif %}
            <span class="sr-only">
                {% if account.is_pinned %}
                    {% trans "Unpin" %}
                {% else %}
                    {% trans "Pin" %}
                {% endif %}
            </span>
        </button>
    {% else %}
        <button type="button"
                disabled
                title="{% trans "Add this account to the pack to pin it" %}"
                class="rounded-lg p-2 cursor-not-allowed text-gray-300 dark:text-gray-600">
            <svg class="w-5 h-5"
                 aria-hidden="true"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="currentColor"
                 viewBox="0 0 16 16">
                <path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a6 6 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707s.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a6 6 0 0 1 1.013.16l3.134-3.133a3 3 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146m.122 2.112v-.002zm0-.002v.002a.5.5 0 0 1-.122.51L6.293 6.878a.5.5 0 0 1-.511.12H5.78l-.014-.004a5 5 0 0 0-.288-.076 5 5 0 0 0-.765-.116c-.422-.028-.836.008-1.175.15l5.51 5.509c.141-.34.177-.753.149-1.175a5 5 0 0 0-.192-1.054l-.004-.013v-.001a.5.5 0 0 1 .12-.512l3.536-3.535a.5.5 0 0 1 .532-.115l.096.022c.087.017.208.034.344.034q.172.002.343-.04L9.927 2.028q-.042.172-.04.343a1.8 1.8 0 0 0 .062.46z" />
            </svg>
            <span class="sr-only">{% trans "Pin" %}</span>
        </button>
    {% endif %}
</div>
