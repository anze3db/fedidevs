<div class="max-w-4xl">
    {% for account in accounts %}
        {% include "starter_pack_account_card.html" %}
    {% empty %}
    {% endfor %}
</div>
{% if accounts.has_next %}
    <div class="mt-12"
         hx-get="{% url 'share_starter_pack' starter_pack.slug %}{% querystring page=accounts.next_page_number %}"
         hx-trigger="intersect once"
         hx-swap="afterend"></div>
{% endif %}
